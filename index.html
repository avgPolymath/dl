<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>FitShala</title>
</head>
<body>
<!--
  FitShala channel-attribution redirect page.
  On load: reads its own ?c= param + any pre-existing utm_* params + navigator.userAgent,
  fires ONE PostHog capture (channel_link_opened) with $set_once first_channel,
  then window.location.replace() to the correct app store.

  PRIVACY / RED LINES (deliberately NOT used — no fingerprinting):
  no canvas / toDataURL / getImageData / WebGL, no clipboard / execCommand,
  no getBattery, no DeviceMotion / DeviceOrientation / Accelerometer / Gyroscope,
  no navigator.plugins / hardwareConcurrency / deviceMemory enumeration,
  no AudioContext, no fetch/XHR to any non-PostHog host.
  This page counts a click; it does not fingerprint a device.
-->
<script>

  // ---- Store URLs (confirmed from lib/src/core/constants/app_strings.dart) ----
  const PLAY_PACKAGE = 'com.fitshala.fitshala_ai_app';  // live applicationId
  const APP_STORE_URL = 'https://apps.apple.com/us/app/fitshala-gym-workout-fitness/id6758107065';  // live App Store listing

  // ---- 1. Resolve channel from own ?c= param (closed enum) ----
  const params = new URLSearchParams(window.location.search);
  const VALID_BUCKETS = ['reddit', 'gym_qr', 'producthunt', 'whatsapp', 'other'];
  const rawC = params.get('c');
  let channel;
  if (rawC === null || rawC === '') {
    channel = 'direct';                                   // c genuinely absent
  } else if (VALID_BUCKETS.indexOf(rawC) !== -1) {
    channel = rawC;                                       // known bucket
  } else {
    channel = 'other';                                    // present but unknown
  }

  // ---- 2. Device detect (userAgent only) ----
  const ua = navigator.userAgent || '';
  const isIOS = /iPhone|iPad|iPod/i.test(ua);
  const isAndroid = /Android/i.test(ua);
  const target_store = isIOS ? 'ios' : 'android';         // unknown UA -> android default

  // ---- 3. Build the redirect URL ----
  let redirectUrl;
  if (isIOS) {
    redirectUrl = APP_STORE_URL;                          // iOS: no referrer (no equivalent)
  } else {
    // Android + unknown UA -> Play Store, with install referrer carrying the channel.
    const referrer = encodeURIComponent('utm_source=' + channel);
    redirectUrl = 'https://play.google.com/store/apps/details?id=' + PLAY_PACKAGE + '&referrer=' + referrer;
  }

  // ---- Build capture properties ----
  const props = {
    channel: channel,
    target_store: target_store,
    $set_once: { first_channel: channel }                 // first write wins; never overwritten
  };
  // utm_* ONLY if already present on this page's URL; omit key entirely when absent.
  ['utm_source', 'utm_medium', 'utm_campaign'].forEach(function (k) {
    const v = params.get(k);
    if (v !== null && v !== '') { props[k] = v; }
  });

  // ---- Redirect: idempotent, so loaded-callback + hard fallback can't double-fire ----
  let redirected = false;
  function redirectNow() {
    if (redirected) return;
    redirected = true;
    window.location.replace(redirectUrl);
  }

  // ---- PostHog init: pure counter, no autocapture / pageview / session recording ----
  posthog.init('phc_PU94EpphWq2aso3m0zhUPx9wEFjnULvwaKCWuphiND6', {
    api_host: 'https://us.i.posthog.com',
    person_profiles: 'always',
    autocapture: false,
    capture_pageview: false,
    disable_session_recording: true,
    // When the real SDK loads, the stub-queued capture below flushes immediately.
    // Small grace so the network request actually leaves before we navigate away.
    loaded: function () {
      setTimeout(redirectNow, 250);
    }
  });

  // ---- 4 & 5. Fire ONE capture (queued by the stub until array.js loads) ----
  posthog.capture('channel_link_opened', props);

  // HARD FALLBACK: offline / blocked-analytics users must still reach the store.
  // Losing the count is acceptable; stranding the user on a blank page is not.
  setTimeout(redirectNow, 2500);
</script>
</body>
</html>
